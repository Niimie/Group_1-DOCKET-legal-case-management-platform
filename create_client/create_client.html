<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docket — New Client</title>
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./create_client.css" />
  </head>

  <body>
    <div class="create-client-page">
      <header class="page-header">
        <a href="../dashboard/dashboard.html" class="back-link">
          <i class="ph ph-arrow-left"></i> Back to Clients
        </a>
        <h1 class="page-title">Add New Client</h1>
        <p class="page-sub">
          Fill in the details below to register a new client.
        </p>
      </header>

      <form id="create-client-form" class="client-form" novalidate>
        <div class="form-row">
          <div class="form-field">
            <label for="full_name">Full Name <span class="req">*</span></label>
            <input
              type="text"
              id="full_name"
              name="full_name"
              placeholder="e.g. Marcus Johnson"
              required
            />
          </div>

          <div class="form-field">
            <label for="email">Email Address <span class="req">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="e.g. marcus.j@gmail.com"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="e.g. +2348023456789"
            />
          </div>

          <div class="form-field">
            <label for="client_type"
              >Client Type <span class="req">*</span></label
            >
            <select id="client_type" name="client_type" required>
              <option value="" disabled selected>Select type</option>
              <option value="individual">Individual</option>
              <option value="corporate">Corporate</option>
            </select>
          </div>
        </div>

        <div class="form-field full-width">
          <label for="address">Address</label>
          <input
            type="text"
            id="address"
            name="address"
            placeholder="e.g. 7 Awolowo Road, Ikoyi"
          />
        </div>

        <div id="form-error" class="form-error hidden"></div>
        <div id="form-success" class="form-success hidden"></div>

        <div class="form-actions">
          <a href="../dashboard/dashboard.html" class="btn-cancel">Cancel</a>
          <button type="submit" class="btn-submit" id="submit-btn">
            <span class="btn-text">Create Client</span>
            <span class="btn-spinner hidden" aria-hidden="true"></span>
          </button>
        </div>
      </form>
    </div>

    <script src="./create_client.js"></script>
  </body>
</html>
