<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docket Login</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css"
    />
  </head>

  <body>
    <div class="container">
      <!-- LEFT PAGE -->

      <section class="left page">
        <div class="brand">
          <img src="Frame 119.png" class="logo" alt="Docket Logo" />

          <h1>Docket</h1>

          <p class="subtitle">Legal Case Management</p>

          <p class="company">Mex-Trial & Associates</p>
        </div>

        <div class="features">
          <div class="feature">
            <i class="ph ph-briefcase"></i>
            <span>All your cases, one place</span>
          </div>

          <div class="feature">
            <i class="ph ph-calendar"></i>
            <span>Never miss a hearing date</span>
          </div>

          <div class="feature">
            <i class="ph ph-users"></i>
            <span>Full team visibility & control</span>
          </div>

          <div class="feature">
            <i class="ph ph-shield"></i>
            <span>Role-based access management</span>
          </div>
        </div>
      </section>

      <!-- RIGHT PAGE -->

      <section class="right page">
        <img src="Frame 119.png" class="backup-logo" alt="Docket Logo" />

        <h1 class="welcome">Welcome back</h1>

        <p class="signin-text">Sign in to your Docket account</p>

        <div class="roles">
          <button class="role active" data-role="secretary">Secretary</button>

          <button class="role" data-role="associate">Associate</button>

          <button class="role" data-role="senior_partner">
            Senior Partner
          </button>
        </div>

        <form id="loginForm">
          <label>Email Address</label>

          <input
            type="email"
            id="email"
            placeholder="chidi@mex-trial.ng"
            required
          />

          <label>Password</label>

          <div class="password-box">
            <input
              type="password"
              id="password"
              placeholder="********"
              required
            />

            <i class="ph ph-eye" id="togglePassword"></i>
          </div>

          <button type="submit" class="signin-btn">
            Sign In
            <a href="../navigation/nav.html"></a>
          </button>

          <div
            id="login-status"
            class="login-status"
            role="status"
            aria-live="polite"
          ></div>
        </form>

        <div class="links">
          <a href="#">Forgot password?</a>

          <p>
            New to Docket?
            <a href="../create_account/create_account.html"
              >Create an account →</a
            >
          </p>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
