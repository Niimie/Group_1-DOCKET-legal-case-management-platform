          <h3>New Clients</h3>

                        <input type="text" placeholder="e.g. Tunde Bakare" id="name">
                    </div>

<label for="email">EMAIL ADDRESS</label>
<input type="text" placeholder="tunde@gmail.com" id="email">

        <label for="Phone number">PHONE NUMBER</label>
        <input type="text" placeholder="+234 800 000 0000" id="Law Firm">
    </div>
    <div class="form-group">

    <select name="client type" id="">
        <option value="1">Individuals</option>

    </select>
    </div>
    <div>
        <button class="continue">Create Client</button>
        <button class="Cancel">Cancel</button>
    </div>
